auth_enabled: false

server:
  http_listen_port: 3100
  log_level: info

distributor:

ingester:
  lifecycler:
    final_sleep: 0s
  chunk_idle_period: 5m
  chunk_retain_period: 30s

storage_config:
  boltdb:
    directory: /loki/index
  filesystem:
    directory: /loki/chunks

schema_config:
  configs:
    - from: 2020-10-15
      store: boltdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 168h

limits_config:
  allow_structured_metadata: false
