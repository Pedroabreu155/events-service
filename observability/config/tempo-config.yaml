stream_over_http_enabled: true

server:
  http_listen_port: 3200

distributor:
  receivers:                          
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317   # Porta gRPC
        http:
          endpoint: 0.0.0.0:4318   # Porta HTTP OTLP


ingester:
  max_block_duration: 1h               
  max_block_bytes: 1_000_000
  trace_idle_period: 10s

compactor:
  compaction:
    block_retention: 24h              
    compaction_window: 1h
    max_block_bytes: 100_000_000
    compacted_block_retention: 1h

storage:
  trace:
    backend: local                    
    block:
      bloom_filter_false_positive: .05
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks
    pool:
      max_workers: 100
      queue_depth: 10000